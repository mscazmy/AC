<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة — بارد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #38b6e8; --navy: #0d2d4e;
      --white: #fff; --off: #f5f9fd; --grey: #6b7a8d;
      --grey-light: #e4ecf3; --text: #1a2a3a;
      --radius: 14px; --shadow: 0 4px 24px rgba(13,45,78,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif; direction: rtl;
      background: linear-gradient(135deg, var(--navy) 0%, #1a4a6e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: var(--white); border-radius: 20px; padding: 44px 40px;
      width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center; margin-bottom: 30px;
    }
    .login-logo .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
    .login-logo h1 { font-size: 2rem; font-weight: 900; color: var(--navy); }
    .login-logo p { color: var(--grey); font-size: 0.9rem; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 700; color: var(--navy); margin-bottom: 7px; font-size: 0.95rem; }
    input {
      width: 100%; padding: 13px 16px; border-radius: 10px;
      border: 2px solid var(--grey-light); font-family: 'Cairo', sans-serif;
      font-size: 0.95rem; color: var(--text); background: var(--off);
      outline: none; transition: all 0.25s;
    }
    input:focus { border-color: var(--sky); background: var(--white); box-shadow: 0 0 0 4px rgba(56,182,232,0.12); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--sky); color: var(--white);
      border: none; border-radius: 10px; font-family: 'Cairo', sans-serif;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: all 0.25s; margin-top: 6px;
    }
    .login-btn:hover { background: var(--navy); }
    .error-msg {
      background: #fdecea; border: 1.5px solid #e74c3c; color: #c0392b;
      padding: 12px 16px; border-radius: 10px; font-size: 0.9rem;
      font-weight: 600; text-align: center; display: none; margin-top: 14px;
    }
    .back-link {
      text-align: center; margin-top: 20px;
    }
    .back-link a { color: var(--sky); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .hint { font-size: 0.8rem; color: var(--grey); text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">❄</span>
      <h1>بـارد</h1>
      <p>لوحة تحكم المسؤول</p>
    </div>
    <div class="form-group">
      <label for="adminUser">اسم المستخدم</label>
      <input type="text" id="adminUser" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="adminPass">كلمة المرور</label>
      <input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()">دخول ← </button>
    <div class="error-msg" id="errorMsg">❌ اسم المستخدم أو كلمة المرور غير صحيحة</div>
    <p class="hint">🔒 كلمة المرور الافتراضية: <strong>admin123</strong> — غيّرها من الإعدادات</p>
    <div class="back-link"><a href="../index.html">← العودة للموقع</a></div>
  </div>
  <script>
    // Simple local password — will be replaced by Supabase Auth later
    const DEFAULT_USER = 'admin';
    const DEFAULT_PASS_KEY = 'barid_admin_pass';
    const SESSION_KEY = 'barid_admin_logged_in';

    function getStoredPass() {
      return localStorage.getItem(DEFAULT_PASS_KEY) || 'admin123';
    }

    function doLogin() {
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value;
      const err = document.getElementById('errorMsg');
      if (user === DEFAULT_USER && pass === getStoredPass()) {
        sessionStorage.setItem(SESSION_KEY, '1');
        window.location.href = 'dashboard.html';
      } else {
        err.style.display = 'block';
        document.getElementById('adminPass').value = '';
      }
    }
  </script>
</body>
</html>
